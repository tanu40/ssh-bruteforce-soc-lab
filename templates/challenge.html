<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>GraySentinel SOC Lab</title>

    <style>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {

            background-color: #0b0f17;
            color: #e6edf3;
            font-family: 'Courier New', monospace;
            min-height: 100vh;
            padding: 30px;

            background-image:
                radial-gradient(circle at top left, rgba(0,255,170,0.08), transparent 400px),
                radial-gradient(circle at bottom right, rgba(0,120,255,0.08), transparent 400px);
        }

        .container {

            max-width: 1200px;
            margin: auto;
        }

        .header {

            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {

            font-size: 42px;
            color: #00ffaa;
            text-shadow: 0 0 15px rgba(0,255,170,0.5);
            margin-bottom: 10px;
        }

        .header p {

            color: #8b949e;
            font-size: 16px;
        }

        .info-bar {

            display: flex;
            justify-content: space-between;
            gap: 20px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .card {

            flex: 1;
            min-width: 220px;

            background: #111827;
            border: 1px solid #1f2937;

            padding: 18px;
            border-radius: 12px;

            box-shadow: 0 0 12px rgba(0,0,0,0.4);
        }

        .card h3 {

            color: #00ffaa;
            margin-bottom: 8px;
            font-size: 18px;
        }

        .logs-container {

            background: #05080f;
            border: 1px solid #1f2937;
            border-radius: 12px;

            padding: 20px;
            margin-bottom: 30px;

            overflow-x: auto;

            box-shadow: 0 0 15px rgba(0,255,170,0.08);
        }

        pre {

            color: #00ff88;
            line-height: 1.6;
            font-size: 14px;
            white-space: pre-wrap;
        }

        .form-section {

            background: #111827;
            border: 1px solid #1f2937;
            border-radius: 12px;

            padding: 25px;
        }

        .form-section h2 {

            margin-bottom: 20px;
            color: #58a6ff;
        }

        .form-group {

            margin-bottom: 20px;
        }

        label {

            display: block;
            margin-bottom: 8px;
            color: #c9d1d9;
        }

        input {

            width: 100%;
            padding: 14px;

            background: #0d1117;
            border: 1px solid #30363d;

            color: white;

            border-radius: 8px;
            font-size: 15px;
        }

        input:focus {

            outline: none;
            border-color: #00ffaa;

            box-shadow: 0 0 10px rgba(0,255,170,0.3);
        }

        button {

            width: 100%;

            padding: 15px;

            background: linear-gradient(90deg, #00ffaa, #0077ff);

            border: none;
            border-radius: 10px;

            color: black;
            font-weight: bold;
            font-size: 16px;

            cursor: pointer;

            transition: 0.3s;
        }

        button:hover {

            transform: translateY(-2px);

            box-shadow: 0 0 20px rgba(0,255,170,0.4);
        }

        .footer {

            text-align: center;
            margin-top: 40px;
            color: #6e7681;
            font-size: 14px;
        }

    </style>

</head>

<body>

<div class="container">

    <div class="header">

        <h1>GraySentinel SOC Lab</h1>

    </div>

    <div class="info-bar">

        <div class="card">

            <h3>Difficulty</h3>
            <p>Beginner / Intermediate</p>

        </div>

        <div class="card">

            <h3>Category</h3>
            <p>Blue Team / SOC</p>

        </div>

    </div>

    <div class="logs-container">

<pre>
{{ logs }}
</pre>

    </div>

    <div class="form-section">

        <h2>Investigation Submission</h2>

        <form action="/submit" method="POST">

            <div class="form-group">

                <label>Attacker IP Address</label>

                <input
                    type="text"
                    name="ip"
                    placeholder="Enter attacker IP"
                >

            </div>

            <div class="form-group">

                <label>Compromised Username</label>

                <input
                    type="text"
                    name="user"
                    placeholder="Enter compromised account"
                >

            </div>

            <div class="form-group">

                <label>Attack Type</label>

                <input
                    type="text"
                    name="attack"
                    placeholder="Enter attack type"
                >

            </div>

            <button type="submit">

                Submit Investigation

            </button>

        </form>

    </div>

    <div class="footer">

        GraySentinel Cybersecurity Training Platform

    </div>

</div>

</body>
</html>
